apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: tax-calculator-pipeline
spec:
  workspaces:
    - name: source
      description: Source code workspace
  tasks:
    - name: npminstall
      taskRef:
        name: npminstall
      workspaces:
        - name: source
          workspace: source

    - name: tests
      taskRef:
        name: jasmine
      runAfter:
        - npminstall
      workspaces:
        - name: source
          workspace: source

    - name: build
      taskRef:
        name: npm
      runAfter:
        - tests
      workspaces:
        - name: source
          workspace: source
