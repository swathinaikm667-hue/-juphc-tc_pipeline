apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: npminstall
spec:
  workspaces:
    - name: source
      description: The source code workspace
  steps:
    - name: npm-install
      image: node:18-alpine
      workingDir: $(workspaces.source.path)
      script: |
        cd $(workspaces.source.path)
        npm ci

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: jasmine
spec:
  workspaces:
    - name: source
      description: The source code workspace
  steps:
    - name: jasmine-tests
      image: node:18-alpine
      workingDir: $(workspaces.source.path)
      script: |
        cd $(workspaces.source.path)
        npx jasmine
