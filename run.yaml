# run.yaml
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: tax-calculator-pipeline-run-
spec:
  pipelineRef:
    name: tax-calculator-pipeline

  params:
    - name: image
      value: us.icr.io/sn-labs-panchami/tax-calculator:latest

  workspaces:
    - name: git-source
      persistentVolumeClaim:
        claimName: tax-calculator-pvc
